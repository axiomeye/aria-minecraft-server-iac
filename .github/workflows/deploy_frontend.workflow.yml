name: deploy frontend

on:
  workflow_run:
    workflows: ["build frontend"]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. abc1234 or latest)"
        required: false
        default: "latest"

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  IMAGE: axiomeye/minecraft-frontend

jobs:
  deploy:
    name: "Deploy"
    runs-on: ubuntu-24.04
    environment: aria-production
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            echo "value=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            INPUT="${{ github.event.inputs.image_tag }}"
            echo "value=${INPUT:-latest}" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2.2.1

      - name: Write env vars file
        env:
          FLASK_SECRET_KEY: ${{ secrets.FRONTEND_FLASK_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.FRONTEND_OAUTH_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.FRONTEND_OAUTH_CLIENT_SECRET }}
          GH_APP_ID: ${{ secrets.GH_APP_ID }}
          GH_APP_INSTALLATION_ID: ${{ secrets.GH_APP_INSTALLATION_ID }}
          GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
          ALLOWED_EMAILS: ${{ vars.FRONTEND_ALLOWED_EMAILS }}
          ZONE: ${{ vars.ZONE }}
          INSTANCE_NAME: ${{ vars.INSTANCE_NAME }}
        run: |
          python3 - <<'PYEOF'
          import os

          def yaml_value(v):
              if '\n' in v:
                  indented = v.replace('\n', '\n  ')
                  return f"|\n  {indented}"
              escaped = v.replace('"', '\\"')
              return f'"{escaped}"'

          env_vars = {
              "GCP_PROJECT": "reflected-gamma-341201",
              "GCP_ZONE": os.environ["ZONE"],
              "INSTANCE_NAME": os.environ["INSTANCE_NAME"],
              "GITHUB_REPO_OWNER": "axiomeye",
              "GITHUB_REPO_NAME": "aria-minecraft-server-iac",
              "OAUTH_REDIRECT_URI": "https://aria-mc-server-972697371927.europe-west8.run.app/auth/callback",
              "ALLOWED_EMAILS": os.environ["ALLOWED_EMAILS"],
              "FLASK_SECRET_KEY": os.environ["FLASK_SECRET_KEY"],
              "GOOGLE_CLIENT_ID": os.environ["GOOGLE_CLIENT_ID"],
              "GOOGLE_CLIENT_SECRET": os.environ["GOOGLE_CLIENT_SECRET"],
              "GH_APP_ID": os.environ["GH_APP_ID"],
              "GH_APP_INSTALLATION_ID": os.environ["GH_APP_INSTALLATION_ID"],
              "GH_APP_PRIVATE_KEY": os.environ["GH_APP_PRIVATE_KEY"],
          }

          lines = [f"{k}: {yaml_value(v)}" for k, v in env_vars.items()]
          with open("/tmp/envvars.yaml", "w") as f:
              f.write("\n".join(lines) + "\n")
          PYEOF

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy aria-mc-server \
            --image="$IMAGE:${{ steps.tag.outputs.value }}" \
            --region="${{ vars.REGION }}" \
            --service-account="minecraft-frontend-sa@reflected-gamma-341201.iam.gserviceaccount.com" \
            --env-vars-file=/tmp/envvars.yaml \
            --execution-environment=gen2 \
            --cpu=1 \
            --memory=512Mi \
            --cpu-throttling \
            --min-instances=0 \
            --max-instances=1 \
            --allow-unauthenticated \
            --quiet
